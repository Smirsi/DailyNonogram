name: DailyNonogram
options:
  bundleIdPrefix: com.philip
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  GoogleMobileAds:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads.git
    from: "11.0.0"

targets:
  DailyNonogram:
    type: application
    platform: iOS
    sources:
      - path: DailyNonogram
        excludes:
          - Resources/Puzzles/**
      - path: DailyNonogram/Resources/Puzzles
        type: folder
        buildPhase: resources
    dependencies:
      - package: GoogleMobileAds
    settings:
      base:
        PRODUCT_NAME: Daily Nonogram
        SUPPORTS_MACCATALYST: YES
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_CFBundleDisplayName: Daily Nonogram
    info:
      path: DailyNonogram/Info.plist
      properties:
        GADApplicationIdentifier: ca-app-pub-1758574140088603~6006395949
